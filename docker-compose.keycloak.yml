# EfficientAI + Keycloak stack (optional enterprise add-on).
#
# Only needed when your EFFICIENTAI_LICENSE includes "keycloak_sso" and you
# want humans to sign in via a self-hosted Keycloak realm.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.keycloak.yml up
#
# After the stack is up:
#   1. Log in to http://localhost:8080 as admin / admin
#   2. Ensure the `efficientai` realm exists (imported from ./docker/keycloak/).
#   3. In config.yml / .env, set auth.providers to include `keycloak` and
#      configure AUTH_KEYCLOAK_BASE_URL=http://localhost:8080 (or the public URL).

services:
  keycloak:
    # 25.x is the current LTS line. Pin an explicit tag so realm imports stay
    # reproducible across deploys.
    image: quay.io/keycloak/keycloak:25.0
    container_name: efficientai_keycloak
    command:
      - start-dev
      - --import-realm
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      # Use the same Postgres instance but a separate database.
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://db:5432/keycloak
      KC_DB_USERNAME: ${POSTGRES_USER:-efficientai}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD:-password}
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
    ports:
      - "8080:8080"
    volumes:
      - ./docker/keycloak:/opt/keycloak/data/import:ro
    depends_on:
      db:
        condition: service_healthy

  # Create the `keycloak` database on first boot.
  db-init-keycloak:
    image: postgres:15
    container_name: efficientai_db_init_keycloak
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:-password}
    entrypoint:
      - /bin/sh
      - -c
      - |
        psql -h db -U ${POSTGRES_USER:-efficientai} -tc \
          "SELECT 1 FROM pg_database WHERE datname = 'keycloak'" | grep -q 1 || \
        psql -h db -U ${POSTGRES_USER:-efficientai} -c "CREATE DATABASE keycloak"
    restart: "no"
