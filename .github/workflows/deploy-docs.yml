name: Deploy Docs to S3

on:
  push:
    branches:
      - main
    paths:
      - 'docs-fumadocs/**'
      - '.github/workflows/docs-quality.yml'
      - '.github/workflows/deploy-docs.yml'
  workflow_dispatch:
    inputs:
      deploy_target:
        description: 'Choose docs stack for deployment'
        required: true
        type: choice
        default: fumadocs
        options:
          - fumadocs
          - legacy

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      DEPLOY_TARGET: ${{ github.event.inputs.deploy_target || 'fumadocs' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            docs-fumadocs/package-lock.json
            EfficientAI-Docs/package-lock.json

      - name: Build Fumadocs site
        if: env.DEPLOY_TARGET == 'fumadocs'
        run: |
          cd docs-fumadocs
          npm ci
          npm run ci:check

      - name: Build legacy Docusaurus site
        if: env.DEPLOY_TARGET == 'legacy'
        run: |
          cd EfficientAI-Docs
          npm ci
          npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy to S3
        run: |
          if [ "${DEPLOY_TARGET}" = "legacy" ]; then
            aws s3 sync ./EfficientAI-Docs/build s3://${{ secrets.AWS_S3_BUCKET }} --delete
          else
            aws s3 sync ./docs-fumadocs/out s3://${{ secrets.AWS_S3_BUCKET }} --delete
          fi

      - name: Invalidating CloudFront cache
        run: |
          aws cloudfront create-invalidation --distribution-id ${{ secrets.AWS_CLOUDFRONT_DISTRIBUTION_ID }} --paths "/*"
