name: Release and Publish Docker Images

on:
  pull_request_target:
    types: [closed]
    branches:
      - main
      - master

env:
  REGISTRY: ghcr.io
  API_IMAGE_NAME: ${{ github.repository }}-api
  WORKER_IMAGE_NAME: ${{ github.repository }}-worker

permissions:
  contents: write
  packages: write
  pull-requests: read

concurrency:
  group: release-${{ github.event.pull_request.base.ref }}
  cancel-in-progress: false

jobs:
  release:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Determine bump type from PR labels
        id: bump
        uses: actions/github-script@v7
        with:
          script: |
            const labels = (context.payload.pull_request.labels || []).map((label) =>
              label.name.toLowerCase()
            );
            core.info(`PR labels: ${labels.join(", ") || "none"}`);

            let bump = "patch";
            if (labels.includes("major")) {
              bump = "major";
            } else if (labels.includes("minor")) {
              bump = "minor";
            } else if (labels.includes("fix") || labels.includes("patch")) {
              bump = "patch";
            } else {
              core.info("No semver label found. Defaulting to patch bump.");
            }

            core.setOutput("bump", bump);

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute next semantic version
        id: version
        env:
          MERGE_SHA: ${{ github.event.pull_request.merge_commit_sha }}
        shell: bash
        run: |
          set -euo pipefail

          git fetch --tags --force
          existing_tag=""
          while IFS= read -r tag; do
            if [[ "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              existing_tag="$tag"
              break
            fi
          done < <(git tag --points-at "$MERGE_SHA" --sort=-v:refname)

          if [[ -n "$existing_tag" ]]; then
            next_tag="$existing_tag"
            create_tag="false"
          else
            latest_tag="$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | sed -n '1p')"

            if [[ -z "$latest_tag" ]]; then
              latest_tag="v0.0.0"
            fi

            current="${latest_tag#v}"
            IFS='.' read -r major minor patch <<< "$current"

            if [[ -z "${major:-}" || -z "${minor:-}" || -z "${patch:-}" ]]; then
              echo "Latest tag '$latest_tag' is not semver format (v<major>.<minor>.<patch>)."
              exit 1
            fi

            case "${{ steps.bump.outputs.bump }}" in
              major)
                major=$((major + 1))
                minor=0
                patch=0
                ;;
              minor)
                minor=$((minor + 1))
                patch=0
                ;;
              patch)
                patch=$((patch + 1))
                ;;
              *)
                echo "Unknown bump type: ${{ steps.bump.outputs.bump }}"
                exit 1
                ;;
            esac

            next_tag="v${major}.${minor}.${patch}"
            create_tag="true"
          fi

          version="${next_tag#v}"
          major_minor="$(echo "$version" | awk -F. '{print $1 "." $2}')"
          echo "next_tag=$next_tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "major_minor=$major_minor" >> "$GITHUB_OUTPUT"
          echo "create_tag=$create_tag" >> "$GITHUB_OUTPUT"
          echo "Next tag: $next_tag"

      - name: Create and push git tag
        if: steps.version.outputs.create_tag == 'true'
        env:
          NEXT_TAG: ${{ steps.version.outputs.next_tag }}
          MERGE_SHA: ${{ github.event.pull_request.merge_commit_sha }}
        shell: bash
        run: |
          set -euo pipefail
          git tag "$NEXT_TAG" "$MERGE_SHA"
          git push origin "$NEXT_TAG"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for API image
        id: api_meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.API_IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=${{ steps.version.outputs.major_minor }}
            type=raw,value=latest

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.api
          push: true
          tags: ${{ steps.api_meta.outputs.tags }}
          labels: ${{ steps.api_meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Extract metadata for Worker image
        id: worker_meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.WORKER_IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=${{ steps.version.outputs.major_minor }}
            type=raw,value=latest

      - name: Build and push Worker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.worker
          push: true
          tags: ${{ steps.worker_meta.outputs.tags }}
          labels: ${{ steps.worker_meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
          build-args: |
            INSTALL_EXTRAS=qualitative-voice,reports

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEXT_TAG: ${{ steps.version.outputs.next_tag }}
          MERGE_SHA: ${{ github.event.pull_request.merge_commit_sha }}
        shell: bash
        run: |
          set -euo pipefail

          if gh release view "$NEXT_TAG" >/dev/null 2>&1; then
            echo "Release $NEXT_TAG already exists. Skipping."
            exit 0
          fi

          gh release create "$NEXT_TAG" \
            --target "$MERGE_SHA" \
            --title "$NEXT_TAG" \
            --generate-notes
