name: PR Label Semantic Release

on:
  pull_request_target:
    types: [closed]
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  release:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Determine bump type from PR labels
        id: bump
        uses: actions/github-script@v7
        with:
          script: |
            const labels = (context.payload.pull_request.labels || []).map((label) =>
              label.name.toLowerCase()
            );
            core.info(`PR labels: ${labels.join(", ") || "none"}`);

            let bump = "patch";
            if (labels.includes("major")) {
              bump = "major";
            } else if (labels.includes("minor")) {
              bump = "minor";
            } else if (labels.includes("fix") || labels.includes("patch")) {
              bump = "patch";
            } else {
              core.info("No semver label found. Defaulting to patch bump.");
            }

            core.setOutput("bump", bump);

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute next semantic version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          git fetch --tags --force
          latest_tag="$(git tag -l 'v*' --sort=-v:refname | head -n 1)"

          if [[ -z "$latest_tag" ]]; then
            latest_tag="v0.0.0"
          fi

          current="${latest_tag#v}"
          IFS='.' read -r major minor patch <<< "$current"

          if [[ -z "${major:-}" || -z "${minor:-}" || -z "${patch:-}" ]]; then
            echo "Latest tag '$latest_tag' is not semver format (v<major>.<minor>.<patch>)."
            exit 1
          fi

          case "${{ steps.bump.outputs.bump }}" in
            major)
              major=$((major + 1))
              minor=0
              patch=0
              ;;
            minor)
              minor=$((minor + 1))
              patch=0
              ;;
            patch)
              patch=$((patch + 1))
              ;;
            *)
              echo "Unknown bump type: ${{ steps.bump.outputs.bump }}"
              exit 1
              ;;
          esac

          next_tag="v${major}.${minor}.${patch}"
          echo "latest_tag=$latest_tag" >> "$GITHUB_OUTPUT"
          echo "next_tag=$next_tag" >> "$GITHUB_OUTPUT"
          echo "Next tag: $next_tag"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEXT_TAG: ${{ steps.version.outputs.next_tag }}
          MERGE_SHA: ${{ github.event.pull_request.merge_commit_sha }}
        shell: bash
        run: |
          set -euo pipefail

          if gh release view "$NEXT_TAG" >/dev/null 2>&1; then
            echo "Release $NEXT_TAG already exists. Skipping."
            exit 0
          fi

          gh release create "$NEXT_TAG" \
            --target "$MERGE_SHA" \
            --title "$NEXT_TAG" \
            --generate-notes
