# EfficientAI Docker Worker Configuration File
# The worker uses network_mode: host for WebRTC, so it must connect via
# "localhost" instead of Docker service names ("db", "redis").

# Application Settings
app:
  name: "EfficientAI Voice AI Evaluation Platform"
  version: "0.1.0"
  debug: true
  secret_key: "your-secret-key-here-change-in-production"

# Server Settings
server:
  host: "0.0.0.0"
  port: 8000

# Database Configuration (localhost — worker uses host networking)
database:
  url: "postgresql://efficientai:password@localhost:5432/efficientai"

# Redis Configuration (localhost — worker uses host networking)
redis:
  url: "redis://localhost:6379/0"

# Celery Configuration (localhost — worker uses host networking)
celery:
  broker_url: "redis://localhost:6379/0"
  result_backend: "redis://localhost:6379/0"

# File Storage
storage:
  upload_dir: "/app/uploads"
  max_file_size_mb: 500
  allowed_audio_formats:
    - "wav"
    - "mp3"
    - "flac"
    - "m4a"

# S3 Configuration (for data sources integration)
# Copy your S3 settings from config.yml here
s3:
  enabled: false
  bucket_name: "your-s3-bucket-name"
  region: "us-east-1"
  access_key_id: "your-access-key-id"
  secret_access_key: "your-secret-access-key"
  endpoint_url: null  # Optional: for S3-compatible services (e.g., MinIO, DigitalOcean Spaces)
  prefix: "audio/"  # Prefix for audio files in bucket

# Speaker Diarization (pyannote.audio)
# Requires accepting model terms at https://huggingface.co/pyannote/speaker-diarization-3.1
diarization:
  huggingface_token:   # Set your HuggingFace token here (e.g., "hf_xxxxx")
  num_speakers: 2  # Force exact speaker count (2 = agent + customer). Set to null for auto-detect.

# CORS Settings
cors:
  origins:
    - "http://localhost:3000"
    - "http://localhost:8000"

# API Settings
api:
  prefix: "/api/v1"
  key_header: "X-API-Key"
  rate_limit_per_minute: 60
