# EfficientAI Docker Compose
# 
# Usage:
#   docker compose up                           # Uses latest images
#   EFFICIENTAI_VERSION=1.0.0 docker compose up # Uses specific version
#
# For local development, uncomment the 'build' sections below.

services:
  db:
    image: postgres:15
    container_name: efficientai_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-efficientai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-efficientai}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-efficientai}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: efficientai_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    # Pre-built image from GitHub Container Registry
    # Use EFFICIENTAI_VERSION env var to pin to a specific version (e.g., 1.0.0)
    image: ghcr.io/efficientai-tech/efficientai-api:${EFFICIENTAI_VERSION:-latest}
    # For local development, uncomment below and comment out the image line:
    # build:
    #   context: .
    #   dockerfile: docker/Dockerfile.api
    # container_name: efficientai_api
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-efficientai}:${POSTGRES_PASSWORD:-password}@db:5432/${POSTGRES_DB:-efficientai}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-change-in-production}
      UPLOAD_DIR: /app/uploads
      DEBUG: ${DEBUG:-True}
      FRONTEND_DIR: /app/frontend/dist
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-}
    volumes:
      - ./uploads:/app/uploads
      - encryption_key:/app/encryption_key_data
      - ./config.docker.yml:/app/config.yml:ro
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c '
      if [ ! -f /app/encryption_key_data/.encryption_key ]; then
        python3 -c "from cryptography.fernet import Fernet; open(\"/app/encryption_key_data/.encryption_key\", \"wb\").write(Fernet.generate_key())";
        echo "Generated new encryption key";
      fi &&
      ln -sf /app/encryption_key_data/.encryption_key /app/.encryption_key &&
      exec eai start --config /app/config.yml --host 0.0.0.0 --port 8000 --no-build-frontend --no-reload
      '

  worker:
    # Pre-built image from GitHub Container Registry
    # Use EFFICIENTAI_VERSION env var to pin to a specific version (e.g., 1.0.0)
    image: ghcr.io/efficientai-tech/efficientai-worker:${EFFICIENTAI_VERSION:-latest}
    # For local development, uncomment below and comment out the image line:
    # build:
    #   context: .
    #   dockerfile: docker/Dockerfile.worker
    #   args:
    #     INSTALL_EXTRAS: "qualitative-voice,reports"
    # container_name: efficientai_worker
    # Use host network mode for WebRTC connectivity (Retell/Vapi calls).
    # NOTE: host networking means Docker DNS is unavailable, so connection URLs
    # must use "localhost" instead of Docker service names like "db" / "redis".
    network_mode: host
    environment:
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./uploads:/app/uploads
      - encryption_key:/app/encryption_key_data
      - ./config.docker.worker.yml:/app/config.yml:ro
    command: >
      sh -c '
      ln -sf /app/encryption_key_data/.encryption_key /app/.encryption_key &&
      exec eai worker --config /app/config.yml --loglevel info
      '

volumes:
  postgres_data:
  encryption_key:
