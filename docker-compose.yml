# EfficientAI Docker Compose
# 
# Usage:
#   docker compose up                           # Uses latest images
#   EFFICIENTAI_VERSION=1.0.0 docker compose up # Uses specific version
#
# For local development, uncomment the 'build' sections below.

services:
  db:
    image: postgres:15
    container_name: efficientai_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-efficientai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-efficientai}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-efficientai}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: loki
      options:
        loki-url: "http://localhost:3100/loki/api/v1/push"
        loki-retries: "5"
        loki-max-backoff: "800ms"
        loki-external-labels: "service=postgres,environment=docker"

  redis:
    image: redis:7-alpine
    container_name: efficientai_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: loki
      options:
        loki-url: "http://localhost:3100/loki/api/v1/push"
        loki-retries: "5"
        loki-max-backoff: "800ms"
        loki-external-labels: "service=redis,environment=docker"

  api:
    # Pre-built image from GitHub Container Registry
    # Use EFFICIENTAI_VERSION env var to pin to a specific version (e.g., 1.0.0)
    image: ghcr.io/efficientai-tech/efficientai-api:${EFFICIENTAI_VERSION:-latest}
    # For local development, uncomment below and comment out the image line:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: efficientai_api
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-efficientai}:${POSTGRES_PASSWORD:-password}@db:5432/${POSTGRES_DB:-efficientai}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-change-in-production}
      UPLOAD_DIR: /app/uploads
      DEBUG: ${DEBUG:-True}
      FRONTEND_DIR: /app/frontend/dist
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-}
    volumes:
      - ./uploads:/app/uploads
      - ./.data:/app/.data
      - ./config.docker.yml:/app/config.yml:ro
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: eai start --config /app/config.yml --host 0.0.0.0 --port 8000 --no-build-frontend --no-reload
    logging:
      driver: loki
      options:
        loki-url: "http://localhost:3100/loki/api/v1/push"
        loki-retries: "5"
        loki-max-backoff: "800ms"
        loki-external-labels: "service=api,environment=docker"

  worker:
    # Pre-built image from GitHub Container Registry
    # Use EFFICIENTAI_VERSION env var to pin to a specific version (e.g., 1.0.0)
    image: ghcr.io/efficientai-tech/efficientai-worker:${EFFICIENTAI_VERSION:-latest}
    # For local development, uncomment below and comment out the image line:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
      args:
        INSTALL_EXTRAS: "qualitative-voice,reports"
    container_name: efficientai_worker
    environment:
      # Worker uses Docker network, so it reaches DB/Redis via service names
      DATABASE_URL: postgresql://${POSTGRES_USER:-efficientai}:${POSTGRES_PASSWORD:-password}@db:5432/${POSTGRES_DB:-efficientai}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./uploads:/app/uploads
      - ./.data:/app/.data
      - ./config.docker.yml:/app/config.yml:ro
    command: eai worker --config /app/config.yml --loglevel info
    logging:
      driver: loki
      options:
        loki-url: "http://localhost:3100/loki/api/v1/push"
        loki-retries: "5"
        loki-max-backoff: "800ms"
        loki-external-labels: "service=worker,environment=docker"

  # ============================================================
  # Observability Stack
  # ============================================================

  loki:
    image: grafana/loki:latest
    container_name: efficientai_loki
    environment:
      # Set LOKI_CONFIG_FILE to switch between filesystem and S3 backends:
      #   filesystem (default): ./observability/loki/loki-config.yml
      #   S3:                   ./observability/loki/loki-config.s3.yml
      LOKI_AUTH_ENABLED: ${LOKI_AUTH_ENABLED:-false}
      LOKI_S3_BUCKET_NAME: ${LOKI_S3_BUCKET_NAME:-}
      LOKI_S3_REGION: ${LOKI_S3_REGION:-us-east-1}
      LOKI_S3_ACCESS_KEY_ID: ${LOKI_S3_ACCESS_KEY_ID:-}
      LOKI_S3_SECRET_ACCESS_KEY: ${LOKI_S3_SECRET_ACCESS_KEY:-}
      LOKI_S3_PREFIX: ${LOKI_S3_PREFIX:-logs/}
    volumes:
      - ./${LOKI_CONFIG_FILE:-observability/loki/loki-config.yml}:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml -config.expand-env=true
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --output-document=- http://localhost:3100/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  prometheus:
    image: prom/prometheus:latest
    container_name: efficientai_prometheus
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=15d"
    depends_on:
      - api

  grafana:
    image: grafana/grafana:latest
    container_name: efficientai_grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
      - loki

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: efficientai_postgres_exporter
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER:-efficientai}:${POSTGRES_PASSWORD:-password}@db:5432/${POSTGRES_DB:-efficientai}?sslmode=disable"
    ports:
      - "9187:9187"
    depends_on:
      db:
        condition: service_healthy

  redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: efficientai_redis_exporter
    environment:
      REDIS_ADDR: "redis://redis:6379"
    ports:
      - "9121:9121"
    depends_on:
      redis:
        condition: service_healthy

  celery-exporter:
    image: danihodovic/celery-exporter:latest
    container_name: efficientai_celery_exporter
    environment:
      CE_BROKER_URL: "redis://redis:6379/0"
    ports:
      - "9808:9808"
    depends_on:
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:
  loki_data:
